version: '3.8'

services:
  db-master:
    image: mysql:8
    container_name: db-master
    command: --server-id=1 --log-bin=mysql-bin --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_master_data:/var/lib/mysql

  db-slave:
    image: mysql:8
    container_name: db-slave
    command: --server-id=2 --log-bin=mysql-bin --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_slave_data:/var/lib/mysql
    depends_on:
      - db-master

  app1:
    build: .
    container_name: app1
    hostname: app1
    environment:
      DB_HOST: db-master
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-admin123}
    depends_on:
      - db-master

  app2:
    build: .
    container_name: app2
    hostname: app2
    environment:
      DB_HOST: db-master
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-admin123}
    depends_on:
      - db-master

  app3:
    build: .
    container_name: app3
    hostname: app3
    environment:
      DB_HOST: db-master
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-admin123}
    depends_on:
      - db-master

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: db-master
      PMA_ARBITRARY: 1
    ports:
      - "8080:80"
    depends_on:
      - db-master

volumes:
  db_master_data:
  db_slave_data:
